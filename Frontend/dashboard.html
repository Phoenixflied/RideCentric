<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RideCentric LIVE | Dispatch</title>
    <link rel="stylesheet" href="/app/style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

    <div id="manual-modal-v3" class="manual-modal-container" style="display: none;">
        <div class="manual-modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="color:#10ffbe; margin:0; font-size: 1.2rem;">ADD MANUAL ARRIVAL</h2>
                <span style="cursor:pointer; font-size:28px; color:#888;" onclick="document.getElementById('manual-modal-v3').style.display='none'">&times;</span>
            </div>
            <form id="manual-flight-form">
                <div class="m-group">
                    <label>FLIGHT #</label>
                    <input type="text" id="m-flight" placeholder="AA123" required>
                </div>
                <div class="m-group">
                    <label>ARRIVAL TIME</label>
                    <input type="time" id="m-arrival" required>
                </div>
                <div class="m-group">
                    <label>DATE</label>
                    <input type="date" id="m-date" required>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="m-group">
                        <label>TERM</label>
                        <input type="text" id="m-term" placeholder="TBD">
                    </div>
                    <div class="m-group">
                        <label>GATE</label>
                        <input type="text" id="m-gate" placeholder="TBD">
                    </div>
                </div>
                <button type="submit" class="m-save-btn">SAVE TO DATABASE</button>
            </form>
        </div>
    </div>

    <header class="glass-header">
        <div class="brand">RideCentric <span>LIVE</span></div>
        <div class="time-control-center">
            <div id="clock">00:00:00</div>
            <input type="date" id="date-picker">
            <button class="btn" onclick="showAllFlights()">Show All</button>
            <button class="btn accent-btn" id="scan-btn" onclick="forceScan()">🔄 Scan PDF</button>
            <div id="scan-status" style="margin-left: 10px; font-size: 0.85rem; color: var(--muted);"></div>
        </div>
        <div class="header-actions">
            <input type="text" id="search-bar" placeholder="Search..." onkeyup="filterSearch()">
            <button class="btn accent-btn" onclick="document.getElementById('manual-modal-v3').style.display='flex'">+ Add Flight</button>
            <button class="btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <main class="split-layout">
        <section id="data-panel" class="panel-left"></section>
        <section class="panel-right"><div id="map"></div></section>
    </main>

    <div id="flight-details-modal" class="modal-overlay" style="display:none; justify-content:center; align-items:center;">
        <div class="modal-box" style="width:420px; padding:20px;">
            <h3 style="margin:0 0 15px; color:#10ffbe;">Flight Details</h3>
            <div class="flight-detail-row" style="margin-bottom:8px;"><strong>Flight:</strong> <span class="detail-flight"></span></div>
            <div class="flight-detail-row" style="margin-bottom:8px;"><strong>Ride #:</strong> <span class="detail-ride"></span></div>
            <div class="flight-detail-row" style="margin-bottom:8px;"><strong>Date:</strong> <span class="detail-date"></span></div>
            <div class="flight-detail-row" style="margin-bottom:8px;"><strong>Arrival:</strong> <span class="detail-arrival"></span></div>
            <div class="flight-detail-row" style="margin-bottom:8px;"><strong>Terminal:</strong> <span class="detail-terminal"></span></div>
            <div class="flight-detail-row" style="margin-bottom:8px;"><strong>Gate:</strong> <span class="detail-gate"></span></div>
            <div class="flight-detail-row" style="margin-bottom:8px;"><strong>Status:</strong> <span class="detail-status"></span></div>
            <div class="flight-detail-row" style="margin-bottom:8px;"><strong>Passenger:</strong> <span class="detail-passenger"></span></div>
            <div class="flight-detail-row" style="margin-bottom:8px;"><strong>Live Status:</strong> <span class="detail-live-status">Loading...</span></div>
            <div class="flight-detail-row" style="margin-bottom:15px;"><strong>Map:</strong> <a href="#" class="detail-map-link" target="_blank" style="color:#4977ff;">View Flight Map</a></div>
            <button class="btn" onclick="closeFlightDetails()">Close</button>
        </div>
    </div>

    <script src="/app/script.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
